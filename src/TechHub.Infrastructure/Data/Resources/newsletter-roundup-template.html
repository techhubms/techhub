<!DOCTYPE html>
<html lang="en">
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Segoe UI,Arial,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="background:#111827;color:#ffffff;padding:20px 24px;font-size:20px;font-weight:700;">TechHub Weekly Roundup</td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <h1 style="margin:0 0 16px 0;font-size:24px;color:#111827;">{Title}</h1>
              <p style="margin:0 0 16px 0;line-height:1.6;color:#374151;">{Introduction}</p>
              <h2 style="margin:20px 0 8px 0;font-size:18px;color:#111827;">📑 In this roundup</h2>
              <div style="margin:0 0 20px 0;">{SectionLinks}</div>
              <p style="margin:0 0 20px 0;">
                <a href="{FullRoundupUrl}" style="display:inline-block;background:#111827;color:#ffffff;text-decoration:none;padding:10px 14px;border-radius:8px;">Read the full roundup →</a>
              </p>
              <p style="margin:0;font-size:12px;color:#6b7280;">
                You received this because you subscribed to TechHub newsletters.<br />
                <a href="{UnsubscribeUrl}" style="color:#2563eb;">Unsubscribe</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
