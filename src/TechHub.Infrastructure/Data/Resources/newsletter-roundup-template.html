<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;font-family:Segoe UI,Arial,sans-serif;color:#c9d1d9;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
    <tr>
      <td align="center" style="padding:20px 8px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:900px;background:#161b22;border-radius:12px;overflow:hidden;border:1px solid #30363d;">
          <tr>
            <td style="background:#252538;color:#f0f6fc;padding:20px 24px;font-size:20px;font-weight:700;border-bottom:3px solid #7f56d9;">TechHub Weekly Roundup</td>
          </tr>
          <tr>
            <td style="padding:24px;background-color:#161b22;">
              <h1 style="margin:0 0 16px 0;font-size:24px;color:#f0f6fc;">{Title}</h1>
              <p style="margin:0 0 16px 0;line-height:1.6;color:#c9d1d9;">{Introduction}</p>
              <h2 style="margin:20px 0 8px 0;font-size:18px;color:#f0f6fc;">📑 In this roundup</h2>
              <div style="margin:0 0 20px 0;">{SectionLinks}</div>
              <p style="margin:0 0 20px 0;">
                <a href="{FullRoundupUrl}" style="display:inline-block;background:#7f56d9;color:#ffffff;text-decoration:none;padding:10px 18px;border-radius:8px;font-weight:600;">Read the full roundup →</a>
              </p>
              <p style="margin:0;font-size:12px;color:#8b949e;border-top:1px solid #30363d;padding-top:16px;">
                You received this because you subscribed to TechHub newsletters.<br />
                <a href="{ManageUrl}" style="color:#9d72d9;">Manage subscription</a> &nbsp;·&nbsp;
                <a href="{UnsubscribeUrl}" style="color:#9d72d9;">Unsubscribe</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
