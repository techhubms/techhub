name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

# Concurrency strategy:
# - NO workflow-level concurrency group. Each push starts its own CI run immediately.
#   This avoids the GitHub Actions limitation where runs pending environment approval
#   block the entire concurrency group, preventing newer runs from starting.
# - Deployment jobs use per-environment concurrency (see deploy-staging, deploy-production)
#   to prevent conflicting deploys to the same environment.
# - PR preview jobs use per-PR concurrency (see pr-preview-build-and-push, pr-preview-deploy)
#   to cancel stale preview deploys when a new commit is pushed to the same PR.
# - CI jobs are stateless and safe to run in parallel across commits.

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

# ════════════════════════════════════════════════════════════════════════════════
# CI JOBS — Run on every trigger (push, PR, manual)
# ════════════════════════════════════════════════════════════════════════════════

jobs:
  build:
    name: Build .NET Solution
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore TechHub.slnx

      - name: Build solution
        run: dotnet build TechHub.slnx --configuration Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: |
            **/bin/Release/
            **/obj/Release/
          retention-days: 1

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event.action != 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore TechHub.slnx

      - name: Run unit tests
        run: |
          dotnet test --project tests/TechHub.Core.Tests/TechHub.Core.Tests.csproj \
            --configuration Release --no-restore \
            --results-directory TestResults \
            --report-xunit-trx --report-xunit-trx-filename core-test-results.trx \
            -- --coverage --coverage-output-format cobertura \
            --coverage-output ${{ github.workspace }}/TestResults/core-coverage.cobertura.xml
          dotnet test --project tests/TechHub.Web.Tests/TechHub.Web.Tests.csproj \
            --configuration Release --no-restore \
            --results-directory TestResults \
            --report-xunit-trx --report-xunit-trx-filename web-test-results.trx \
            -- --coverage --coverage-output-format cobertura \
            --coverage-output ${{ github.workspace }}/TestResults/web-coverage.cobertura.xml

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: unit-test-results
          path: '**/TestResults/**'
          retention-days: 7

      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-unit
          path: '**/TestResults/*-coverage.cobertura.xml'
          retention-days: 7

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event.action != 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore TechHub.slnx

      - name: Run integration tests
        run: |
          dotnet test --project tests/TechHub.Api.Tests/TechHub.Api.Tests.csproj \
            --configuration Release \
            --no-restore \
            --results-directory TestResults \
            --report-xunit-trx \
            --report-xunit-trx-filename integration-test-results.trx \
            -- --coverage --coverage-output-format cobertura \
            --coverage-output ${{ github.workspace }}/TestResults/api-coverage.cobertura.xml
          dotnet test --project tests/TechHub.Infrastructure.Tests/TechHub.Infrastructure.Tests.csproj \
            --configuration Release \
            --no-restore \
            --results-directory TestResults \
            --report-xunit-trx \
            --report-xunit-trx-filename infrastructure-test-results.trx \
            -- --coverage --coverage-output-format cobertura \
            --coverage-output ${{ github.workspace }}/TestResults/infrastructure-coverage.cobertura.xml

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: integration-test-results
          path: '**/TestResults/**'
          retention-days: 7

      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-integration
          path: '**/TestResults/*-coverage.cobertura.xml'
          retention-days: 7

  test-powershell:
    name: PowerShell Tests
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "tests/powershell"
          $config.Run.Throw = $true
          $config.Output.Verbosity = "Detailed"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = "TestResults/pester-results.xml"
          $config.TestResult.OutputFormat = "JUnitXml"
          Invoke-Pester -Configuration $config

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: powershell-test-results
          path: TestResults/pester-results.xml
          retention-days: 7

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Restore .NET dependencies
        run: dotnet restore TechHub.slnx

      - name: Check dotnet format
        run: |
          dotnet format TechHub.slnx --verify-no-changes --verbosity diagnostic --severity error

      - name: Install npm dependencies
        run: npm ci

      - name: Run markdownlint
        run: |
          npx markdownlint-cli2 "**/*.md" "#node_modules" "#.tmp"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore TechHub.slnx

      - name: Run dependency vulnerability scan
        run: |
          dotnet list TechHub.slnx package --vulnerable --include-transitive

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          skip-dirs: 'node_modules,.tmp,scripts/data/rss-cache'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: csharp, javascript-typescript, actions
          build-mode: none
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

  code-coverage:
    name: Code Coverage Report
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: always() && github.event.action != 'closed'

    steps:
      - name: Download unit coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-unit
          path: coverage-data/unit
        continue-on-error: true

      - name: Download integration coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-integration
          path: coverage-data/integration
        continue-on-error: true

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Merge and generate coverage report
        run: |
          # Find all Cobertura XML files
          COVERAGE_FILES=$(find coverage-data -name '*.cobertura.xml' -type f 2>/dev/null | tr '\n' ';')

          if [ -z "$COVERAGE_FILES" ]; then
            echo "## 📊 Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ No coverage data available. Test jobs may have failed." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "Found coverage files: $COVERAGE_FILES"

          reportgenerator \
            -reports:"$COVERAGE_FILES" \
            -targetdir:coverage-report \
            -reporttypes:"Cobertura;MarkdownSummaryGithub" \
            -verbosity:Warning

          # Append Markdown summary to GitHub Step Summary
          if [ -f coverage-report/SummaryGithub.md ]; then
            echo "## 📊 Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════════
  # Quality Gate — All CI checks must pass before deployment
  # ══════════════════════════════════════════════════════════════════════════════

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [build, test-unit, test-integration, test-powershell, lint, security, codeql]
    if: always() && github.event.action != 'closed'

    steps:
      - name: Check quality gate
        run: |
          echo "## 🎯 Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check each job result
          BUILD_STATUS="${{ needs.build.result }}"
          UNIT_STATUS="${{ needs.test-unit.result }}"
          INTEGRATION_STATUS="${{ needs.test-integration.result }}"
          POWERSHELL_STATUS="${{ needs.test-powershell.result }}"
          LINT_STATUS="${{ needs.lint.result }}"
          SECURITY_STATUS="${{ needs.security.result }}"
          CODEQL_STATUS="${{ needs.codeql.result }}"

          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Build
          if [ "$BUILD_STATUS" = "success" ]; then
            echo "| 🏗️ Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🏗️ Build | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Unit Tests
          if [ "$UNIT_STATUS" = "success" ]; then
            echo "| 🧪 Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🧪 Unit Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Integration Tests
          if [ "$INTEGRATION_STATUS" = "success" ]; then
            echo "| 🔗 Integration Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔗 Integration Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # PowerShell Tests
          if [ "$POWERSHELL_STATUS" = "success" ]; then
            echo "| 🔵 PowerShell Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔵 PowerShell Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Lint
          if [ "$LINT_STATUS" = "success" ]; then
            echo "| 📝 Linting & Formatting | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📝 Linting & Formatting | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Security
          if [ "$SECURITY_STATUS" = "success" ]; then
            echo "| 🔒 Security Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔒 Security Scan | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # CodeQL
          if [ "$CODEQL_STATUS" = "success" ]; then
            echo "| 🛡️ CodeQL Analysis | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🛡️ CodeQL Analysis | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall result
          if [ "$BUILD_STATUS" = "success" ] && \
             [ "$UNIT_STATUS" = "success" ] && \
             [ "$INTEGRATION_STATUS" = "success" ] && \
             [ "$POWERSHELL_STATUS" = "success" ] && \
             [ "$LINT_STATUS" = "success" ] && \
             [ "$SECURITY_STATUS" = "success" ] && \
             [ "$CODEQL_STATUS" = "success" ]; then
            echo "### ✅ All quality gates passed! 🎉" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # PR-specific guidance
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
              echo "- 🎉 This PR is ready for review and merge!" >> $GITHUB_STEP_SUMMARY
              echo "- 📊 Code coverage reports available in artifacts" >> $GITHUB_STEP_SUMMARY
            fi

            exit 0
          else
            echo "### ❌ Quality gate failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Please fix the failing checks before merging:**" >> $GITHUB_STEP_SUMMARY

            if [ "$BUILD_STATUS" != "success" ]; then
              echo "- 🏗️ Build failed - check compilation errors" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$UNIT_STATUS" != "success" ] || [ "$INTEGRATION_STATUS" != "success" ] || [ "$POWERSHELL_STATUS" != "success" ]; then
              echo "- 🧪 Tests failed - see test results in job logs" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$LINT_STATUS" != "success" ]; then
              echo "- 📝 Code formatting issues - run \`dotnet format\` and \`markdownlint-cli2 --fix\`" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$SECURITY_STATUS" != "success" ]; then
              echo "- 🔒 Security scan found vulnerabilities - review Security tab" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$CODEQL_STATUS" != "success" ]; then
              echo "- 🛡️ CodeQL analysis found issues - review Security tab" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📖 See [testing documentation](docs/testing-strategy.md) for help" >> $GITHUB_STEP_SUMMARY

            exit 1
          fi

  # ══════════════════════════════════════════════════════════════════════════════
  # DEPLOYMENT JOBS — Only run on push/manual (NOT on PRs)
  # All deployment jobs require quality-gate to pass first.
  # Every deployment runs the full Bicep template — ARM is idempotent and only
  # redeploys resources whose desired state actually changed.
  # ══════════════════════════════════════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # Shared infrastructure (ACR) — always runs
  # ──────────────────────────────────────────────
  deploy-shared-infra:
    name: Deploy Shared Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: quality-gate
    concurrency:
      group: deploy-shared-infra
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy shared infrastructure
        shell: pwsh
        env:
          ADMIN_IP_ADDRESSES: ${{ secrets.ADMIN_IP_ADDRESSES }}
        run: |
          ./scripts/Deploy-Infrastructure.ps1 `
            -Environment shared `
            -Mode deploy

  # ──────────────────────────────────────────────
  # Build & push Docker images
  # Runs after shared infra (ACR must exist)
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: deploy-shared-infra
    concurrency:
      group: deploy-build-and-push
      cancel-in-progress: false
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate image tag
        id: tag
        run: echo "image-tag=$(date -u +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push images
        shell: pwsh
        run: |
          ./scripts/Deploy-Application.ps1 `
            -Environment staging `
            -Tag "${{ steps.tag.outputs.image-tag }}" `
            -SkipDeploy

  # ──────────────────────────────────────────────
  # Staging infrastructure deployment (networking, monitoring, shared env)
  # No permanent staging Container Apps — PR environments handle that.
  # ──────────────────────────────────────────────
  deploy-staging-infra:
    name: Deploy Staging Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy staging infrastructure
        shell: pwsh
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          ADMIN_IP_ADDRESSES: ${{ secrets.ADMIN_IP_ADDRESSES }}
        run: |
          ./scripts/Deploy-Infrastructure.ps1 `
            -Environment staging `
            -Mode deploy `
            -ImageTag "${{ needs.build-and-push.outputs.image-tag }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Deployment summary
        run: |
          echo "## Staging Infrastructure Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Staging infrastructure (VNet, monitoring, Container Apps Environment) is ready for PR environments." >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # Deploy to Production (infra + app in one shot)
  # Uses GitHub environment protection for approval
  # No staging E2E gate — E2E runs in the PR preview environment before merge.
  # Production gets smoke tests (read-only, < 30s) instead.
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://${{ steps.deploy.outputs.web-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy production infrastructure and application
        id: deploy
        shell: pwsh
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          ADMIN_IP_ADDRESSES: ${{ secrets.ADMIN_IP_ADDRESSES }}
        run: |
          ./scripts/Deploy-Infrastructure.ps1 `
            -Environment production `
            -Mode deploy `
            -ImageTag "${{ needs.build-and-push.outputs.image-tag }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Use the known primary hostname (wildcard custom domains like *.hub.ms are not valid URLs)
          "web-url=tech.hub.ms" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Smoke tests
        shell: pwsh
        run: |
          $primaryUrls = @('https://tech.hub.ms', 'https://tech.xebia.ms')
          Write-Host "Waiting 60 seconds for deployment to stabilize..."
          Start-Sleep -Seconds 60

          foreach ($webUrl in $primaryUrls) {
            # Alive check
            $alive = try { Invoke-WebRequest -Uri "$webUrl/alive" -TimeoutSec 30 -UseBasicParsing } catch { $null }
            if ($alive -and $alive.StatusCode -eq 200) {
              Write-Host "[OK] Alive check passed ($webUrl/alive)"
            } else {
              Write-Host "::error::Alive check failed ($webUrl/alive)"
              exit 1
            }

            # Health check
            $health = try { Invoke-WebRequest -Uri "$webUrl/health" -TimeoutSec 30 -UseBasicParsing } catch { $null }
            if ($health -and $health.StatusCode -eq 200) {
              Write-Host "[OK] Health check passed ($webUrl/health)"
            } else {
              Write-Host "::error::Health check failed ($webUrl/health)"
              exit 1
            }

            # Homepage check
            $homepage = try { Invoke-WebRequest -Uri $webUrl -TimeoutSec 30 -UseBasicParsing } catch { $null }
            if ($homepage -and $homepage.StatusCode -eq 200) {
              Write-Host "[OK] Homepage accessible ($webUrl)"
            } else {
              Write-Host "::error::Homepage not accessible ($webUrl)"
              exit 1
            }
          }

          # Representative API call (read-only, safe for production).
          # This verifies the API is serving data. The endpoint is a public read-only content
          # listing that requires no authentication and is part of the stable public API.
          $apiUrl = "https://tech.hub.ms/api/content?limit=1"
          $api = try { Invoke-WebRequest -Uri $apiUrl -TimeoutSec 30 -UseBasicParsing } catch { $null }
          if ($api -and $api.StatusCode -eq 200) {
            Write-Host "[OK] API smoke test passed ($apiUrl)"
          } else {
            Write-Host "::error::API smoke test failed ($apiUrl)"
            exit 1
          }

      - name: Deployment summary
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag**: ${{ needs.build-and-push.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed By**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Web**: https://${{ steps.deploy.outputs.web-url }}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════════
  # PR PREVIEW JOBS — Only run on pull requests (not closed), after quality gate
  # ════════════════════════════════════════════════════════════════════════════════

  pr-preview-build-and-push:
    name: Build & Push Docker Images (PR Preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: quality-gate
    concurrency:
      group: pr-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate image tag
        id: tag
        run: echo "image-tag=pr-${{ github.event.pull_request.number }}-$(date -u +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push images
        shell: pwsh
        run: |
          ./scripts/Deploy-Application.ps1 `
            -Environment staging `
            -Tag "${{ steps.tag.outputs.image-tag }}" `
            -SkipDeploy

  pr-preview-deploy:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    needs: pr-preview-build-and-push
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    environment: staging
    concurrency:
      group: pr-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    outputs:
      web-url: ${{ steps.deploy.outputs.web-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy PR preview Container Apps
        id: deploy
        shell: pwsh
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          ./scripts/Deploy-PrPreview.ps1 `
            -PrNumber ${{ github.event.pull_request.number }} `
            -Action deploy `
            -Tag "${{ needs.pr-preview-build-and-push.outputs.image-tag }}"

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          WEB_URL="${{ steps.deploy.outputs.web-url }}"
          SHORT_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          cat > /tmp/pr-preview-comment.md << EOF
          <!-- PR-PREVIEW -->
          ## 🚀 PR Preview Environment

          A preview environment has been deployed for this pull request.

          | | |
          |---|---|
          | **Web URL** | ${WEB_URL} |
          | **Commit** | \`${SHORT_SHA}\` |

          > [!NOTE]
          > The environment uses an isolated PostgreSQL database (cloned from production via PITR) and runs in the staging Azure Container Apps Environment.
          > It will be automatically removed when this PR is closed.
          EOF

          # Find any existing PR preview comment (returns ID or empty)
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq 'first(.[] | select(.body | startswith("<!-- PR-PREVIEW -->")) | .id) // empty')

          if [ -n "$COMMENT_ID" ]; then
            # Update the existing comment
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              --method PATCH \
              -f body="$(cat /tmp/pr-preview-comment.md)"
          else
            # Create a new comment
            gh pr comment "$PR_NUMBER" --body-file /tmp/pr-preview-comment.md
          fi

  pr-preview-e2e:
    name: E2E Tests (PR Preview)
    runs-on: ubuntu-latest
    needs: pr-preview-deploy
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    concurrency:
      group: test-e2e-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore TechHub.slnx

      - name: Build solution
        run: dotnet build TechHub.slnx --configuration Release --no-restore

      - name: Install Playwright dependencies
        run: |
          cd tests/TechHub.E2E.Tests
          pwsh bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Run E2E tests against PR preview
        run: |
          dotnet test --project tests/TechHub.E2E.Tests/TechHub.E2E.Tests.csproj \
            --configuration Release \
            --no-build \
            --results-directory TestResults \
            --report-xunit-trx \
            --report-xunit-trx-filename e2e-test-results.trx \
            -- --filter-not-trait "Category=Performance"
        env:
          E2E_BASE_URL: ${{ needs.pr-preview-deploy.outputs.web-url }}

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-preview-test-results
          path: '**/TestResults/**'
          retention-days: 7

      - name: Upload Playwright traces
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-traces-preview
          path: tests/TechHub.E2E.Tests/bin/Release/net10.0/playwright-traces/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════════
  # PR PREVIEW TEARDOWN — Runs when PR is closed (no quality gate needed)
  # ════════════════════════════════════════════════════════════════════════════════

  pr-preview-teardown:
    name: Teardown PR Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete PR preview Container Apps
        shell: pwsh
        run: |
          ./scripts/Deploy-PrPreview.ps1 `
            -PrNumber ${{ github.event.pull_request.number }} `
            -Action teardown

      - name: Update PR comment to reflect teardown
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          cat > /tmp/pr-preview-removed.md << 'EOF'
          <!-- PR-PREVIEW -->
          ## ✅ PR Preview Environment Removed

          The preview environment for this pull request has been removed.
          EOF

          # Find the existing PR preview comment and update it
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq 'first(.[] | select(.body | startswith("<!-- PR-PREVIEW -->")) | .id) // empty')

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              --method PATCH \
              -f body="$(cat /tmp/pr-preview-removed.md)"
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/pr-preview-removed.md
          fi
