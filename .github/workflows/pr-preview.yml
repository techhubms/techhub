name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

# One deployment per PR at a time. New pushes to an open PR cancel any
# in-progress deploy for that same PR so the latest commit wins.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

# ════════════════════════════════════════════════════════════════════════════════
# BUILD & PUSH — Skip when PR is closed
# ════════════════════════════════════════════════════════════════════════════════

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate image tag
        id: tag
        run: echo "image-tag=pr-${{ github.event.pull_request.number }}-$(date -u +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push images
        shell: pwsh
        run: |
          ./scripts/Deploy-Application.ps1 `
            -Environment staging `
            -Tag "${{ steps.tag.outputs.image-tag }}" `
            -SkipDeploy

  # ════════════════════════════════════════════════════════════════════════════════
  # DEPLOY — Deploy PR Container Apps to staging environment
  # ════════════════════════════════════════════════════════════════════════════════

  deploy-pr-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.action != 'closed'
    environment: staging
    outputs:
      web-url: ${{ steps.deploy.outputs.web-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy PR preview Container Apps
        id: deploy
        shell: pwsh
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          ./scripts/Deploy-PrPreview.ps1 `
            -PrNumber ${{ github.event.pull_request.number }} `
            -Action deploy `
            -Tag "${{ needs.build-and-push.outputs.image-tag }}"

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          WEB_URL="${{ steps.deploy.outputs.web-url }}"
          SHORT_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          cat > /tmp/pr-preview-comment.md << EOF
          <!-- PR-PREVIEW -->
          ## 🚀 PR Preview Environment

          A preview environment has been deployed for this pull request.

          | | |
          |---|---|
          | **Web URL** | ${WEB_URL} |
          | **Commit** | \`${SHORT_SHA}\` |

          > [!NOTE]
          > The environment uses the shared staging database and runs in the staging Azure Container Apps Environment.
          > It will be automatically removed when this PR is closed.
          EOF

          # Find any existing PR preview comment (returns ID or empty)
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq 'first(.[] | select(.body | startswith("<!-- PR-PREVIEW -->")) | .id) // empty')

          if [ -n "$COMMENT_ID" ]; then
            # Update the existing comment
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              --method PATCH \
              -f body="$(cat /tmp/pr-preview-comment.md)"
          else
            # Create a new comment
            gh pr comment "$PR_NUMBER" --body-file /tmp/pr-preview-comment.md
          fi

  # ════════════════════════════════════════════════════════════════════════════════
  # E2E TESTS — Run Playwright tests against the PR preview environment
  # ════════════════════════════════════════════════════════════════════════════════

  test-e2e-preview:
    name: E2E Tests (PR Preview)
    runs-on: ubuntu-latest
    needs: deploy-pr-preview
    if: github.event.action != 'closed'
    concurrency:
      group: test-e2e-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore TechHub.slnx

      - name: Build solution
        run: dotnet build TechHub.slnx --configuration Release --no-restore

      - name: Install Playwright dependencies
        run: |
          cd tests/TechHub.E2E.Tests
          pwsh bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Run E2E tests against PR preview
        run: |
          dotnet test --project tests/TechHub.E2E.Tests/TechHub.E2E.Tests.csproj \
            --configuration Release \
            --no-build \
            --results-directory TestResults \
            --report-xunit-trx \
            --report-xunit-trx-filename e2e-test-results.trx \
            -- --filter-not-trait "Category=Performance"
        env:
          E2E_BASE_URL: ${{ needs.deploy-pr-preview.outputs.web-url }}

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: e2e-test-results
          path: '**/TestResults/**'
          retention-days: 7

      - name: Upload Playwright traces
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: playwright-traces
          path: tests/TechHub.E2E.Tests/bin/Release/net10.0/playwright-traces/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════════
  # TEARDOWN — Remove PR Container Apps when PR is closed
  # ════════════════════════════════════════════════════════════════════════════════

  teardown-pr-preview:
    name: Teardown PR Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete PR preview Container Apps
        shell: pwsh
        run: |
          ./scripts/Deploy-PrPreview.ps1 `
            -PrNumber ${{ github.event.pull_request.number }} `
            -Action teardown

      - name: Update PR comment to reflect teardown
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          cat > /tmp/pr-preview-removed.md << 'EOF'
          <!-- PR-PREVIEW -->
          ## ✅ PR Preview Environment Removed

          The preview environment for this pull request has been removed.
          EOF

          # Find the existing PR preview comment and update it
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq 'first(.[] | select(.body | startswith("<!-- PR-PREVIEW -->")) | .id) // empty')

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              --method PATCH \
              -f body="$(cat /tmp/pr-preview-removed.md)"
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/pr-preview-removed.md
          fi
